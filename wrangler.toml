name = "nano"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "harness-db"
database_id = "45b5d39b-e798-4e0d-b39a-fc357ec038a9"

[durable_objects]
bindings = [
  { name = "AGENT_SESSION", class_name = "AgentSession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentSession"]

[ai]
binding = "AI"
remote = true
